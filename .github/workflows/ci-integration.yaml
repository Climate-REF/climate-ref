# These tests run on self-hosted runners with access to a shared cache of datasets and software.
# This allows us to run the full suite of tests,
# including slow integration tests that require large datasets and/or long runtimes.
#
# The following environment variables have been configured to point to shared cache locations on the runner:
#
# REF_DATASET_CACHE_DIR: /data/cache/datasets
# REF_SOFTWARE_ROOT: /data/cache/software
#
# The ~/.esgf directory is also configured to point to a shared cache location downloaded ESGF datasets.
#
# Fetching is deliberately confined to the `populate-cache` job which should pre-cache the required data.
# That job also writes the test-case `catalog.paths.yaml` sidecars under $REF_DATASET_CACHE_DIR/test-case-paths.
# They live in the shared cache rather than the checkout so the `test-cases` jobs can still resolve inputs.
name: CI Integration Tests
on:
  # Allow manual triggering of this workflow
  workflow_dispatch:
  # Run on each push to main and tagged version
  push:
    branches: [main]
    tags: ['v*']
  # Runs every day at 2:15am (UTC) (~ midday in AEST)
  schedule:
    - cron: '2 15 * * *'

permissions:
  contents: read

# Serialise integration runs so only one `populate-cache` ever writes to the shared ESGF/dataset cache at a time.
# Queue rather than cancel the in-flight run
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  populate-cache:
    if: github.repository == 'Climate-REF/climate-ref'
    runs-on: "arc-climate-ref"
    env:
      TQDM_DISABLE: "1"
      # Diagnostics whose full-resolution ESGF data is too large to fetch/run within CI limits
      REF_TEST_CASES_SKIP: "ilamb/thetao-woa2023-surface"
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          python-version: "3.13"
      - name: Populate shared cache
        run: |
          uv sync
          uv run ref datasets fetch-sample-data
          uv run ref datasets fetch-data --registry ilamb-test
          uv run ref datasets fetch-data --registry obs4ref
          uv run ref providers setup
      # Warm the shared intake-esgf cache (~/.esgf) here, as the single writer, so the
      # downstream test jobs only ever read from it.
      # Per-test-case failures are logged and skipped inside the command,
      # so a non-zero exit here means the fetch crashed and the sidecars are incomplete.
      # Failing fast beats the confusing DatasetResolutionError cascade in the test-cases jobs.
      - name: Prefetch test-case data from ESGF
        timeout-minutes: 90
        run: |
          uv run ref test-cases fetch
      - name: Verify paths sidecars were written to the shared cache
        run: |
          sidecar_root="${REF_DATASET_CACHE_DIR:?REF_DATASET_CACHE_DIR is not set on this runner}/test-case-paths"
          count=$(find "$sidecar_root" -name catalog.paths.yaml 2>/dev/null | wc -l)
          echo "Found $count paths sidecar(s) under $sidecar_root"
          if [ "$count" -eq 0 ]; then
            echo "::error::No catalog.paths.yaml written, so the test-cases jobs cannot resolve datasets."
            exit 1
          fi
      - name: Prune orphaned ESGF download temp files
        if: always()
        run: |
          find "$HOME/.esgf" -type f -name '*.nc????????' -print -delete || true

  tests-slow:
    if: github.repository == 'Climate-REF/climate-ref'
    needs: [populate-cache]
    env:
      REF_TEST_OUTPUT: "test-outputs"
      PYTEST_ADDOPTS: "--slow"
      TQDM_DISABLE: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.13" ]
    runs-on: "arc-climate-ref"
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          uv sync
          uv run pytest packages tests --slow --no-docker -m "not test_cases" -r a -v
      # Upload the scratch and executions directories as artifacts
      - name: Upload scratch artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-output-${{ matrix.python-version }}
          path: ${{ env.REF_TEST_OUTPUT }}
          retention-days: 7

  test-cases:
    if: github.repository == 'Climate-REF/climate-ref'
    needs: [populate-cache]
    runs-on: "arc-climate-ref"
    env:
      TQDM_DISABLE: "1"
      # Diagnostics whose full-resolution ESGF data is too large to fetch/run within CI limits
      REF_TEST_CASES_SKIP: "ilamb/thetao-woa2023-surface"
    strategy:
      fail-fast: false
      matrix:
        provider: [example, esmvaltool, ilamb, pmp]
        include:
          # PMP has 21 slow cases at roughly 5 minutes each, so 60 minutes is not enough.
          - provider: pmp
            timeout: 120
    name: test-cases (${{ matrix.provider }})
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          python-version: "3.13"
      - name: Run test cases
        timeout-minutes: ${{ matrix.timeout || 60 }}
        run: |
          uv sync
          uv run pytest packages/climate-ref-${{ matrix.provider }} -m test_cases --slow -v -r a
      - name: Upload test case outputs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-case-outputs-${{ matrix.provider }}
          path: ~/.climate-ref/results/
          retention-days: 7
