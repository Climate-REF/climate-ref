# Grey list: datasets that should be excluded from diagnostics by default.
#
# It can be used to skip datasets that are known to have issues and keep
# diagnostics that use multiple datasets from running.
#
# The format used in this configuration file is:
# provider:
#   diagnostic:
#     source_type:
#       - facet: value
#       - other_facet: [other_value1, other_value2]
#
# The facets listed here will be used to create `climate_ref_core.constraints.IgnoreFacets`
# instances that will be prepended to the constraints of the data requirements
# of the diagnostics that the facets are listed under.
#
# `Config.grey_list_file` controls the location this file lives at and
# `Config.grey_list_url` controls where the solver refreshes it from
# (set the URL to None to disable fetching). The default cache is refreshed
# at most every `DEFAULT_GREY_LIST_MAX_AGE` (6 hours).
#
esmvaltool:
  sea-ice-sensitivity:
      cmip6:
        - experiment_id: historical
          grid_label: gn
          member_id: r1i1p1f1
          source_id: CAS-ESM2-0
          table_id: SImon
          variable_id: siconc
          version: v20201225
        - experiment_id: historical
          source_id: BCC-ESM1
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: CMCC-CM2-HR4
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: CMCC-CM2-SR5
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: CMCC-ESM2
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: ICON-ESM-LR
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: NorESM2-LM
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: NorESM2-MM
          table_id: SImon
          variable_id: siconc
        - experiment_id: historical
          source_id: SAM0-UNICON
          table_id: SImon
          variable_id: siconc
