documentation:
  title: 'Equilibrium Climate Sensitivity (ECS)

    '
  description: 'Calculate Equilibrium Climate Sensitivity (ECS) using linear regression
    following Gregory et al. (2004).

    '
  authors:
  - schlund_manuel
  references:
  - gregory04grl
datasets:
- project: CMIP6
  activity: CMIP
  dataset: ACCESS-ESM1-5
  ensemble: r1i1p1f1
  institute: CSIRO
  exp: abrupt-4xCO2
  grid: gn
  mip: Amon
  timerange: 0101/0250
- project: CMIP6
  activity: CMIP
  dataset: ACCESS-ESM1-5
  ensemble: r1i1p1f1
  institute: CSIRO
  exp: piControl
  grid: gn
  mip: Amon
  timerange: 0101/0250
preprocessors:
  spatial_mean:
    area_statistics:
      operator: mean
diagnostics:
  ecs:
    description: Calculate ECS for CMIP7 models.
    variables:
      tas:
        mip: atmos
        frequency: mon
        region: glb
        preprocessor: spatial_mean
      rtnt:
        mip: atmos
        frequency: mon
        region: glb
        derive: true
        preprocessor: spatial_mean
    scripts:
      calculate:
        script: climate_metrics/ecs.py
        calculate_mmm: false
