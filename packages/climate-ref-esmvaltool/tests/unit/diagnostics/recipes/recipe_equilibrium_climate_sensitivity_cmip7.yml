documentation:
  title: 'Equilibrium Climate Sensitivity (ECS)

    '
  description: 'Calculate Equilibrium Climate Sensitivity (ECS) using linear regression
    following Gregory et al. (2004).

    '
  authors:
  - schlund_manuel
  references:
  - gregory04grl
datasets:
- project: CMIP7
  activity: CMIP
  dataset: ACCESS-ESM1-5
  ensemble: r1i1p1f1
  exp: abrupt-4xCO2
  frequency: mon
  grid: gn
  institute: CSIRO
  mip: atmos
  region: glb
  timerange: 0101/0250
- project: CMIP7
  activity: CMIP
  dataset: ACCESS-ESM1-5
  ensemble: r1i1p1f1
  exp: piControl
  frequency: mon
  grid: gn
  institute: CSIRO
  mip: atmos
  region: glb
  timerange: 0101/0250
preprocessors:
  spatial_mean:
    area_statistics:
      operator: mean
diagnostics:
  ecs:
    description: Calculate ECS for CMIP7 models.
    variables:
      tas:
        branding_suffix: tavg-h2m-hxy-u
        mip: atmos
        frequency: mon
        region: glb
        preprocessor: spatial_mean
      rtnt:
        branding_suffix: tavg-u-hxy-u
        mip: atmos
        frequency: mon
        region: glb
        derive: true
        preprocessor: spatial_mean
    scripts:
      calculate:
        script: climate_metrics/ecs.py
        calculate_mmm: false
