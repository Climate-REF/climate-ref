documentation:
  title: 'Transient Climate Response to Cumulative CO2 Emissions (TCRE).

    '
  description: 'Calculate Transient Climate Response to Cumulative CO2 Emissions (TCRE).

    '
  authors:
  - schlund_manuel
  maintainer:
  - schlund_manuel
  references:
  - sanderson24gmd
preprocessors:
  global_annual_mean_anomaly:
    custom_order: true
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
      keep_group_coordinates: true
  global_cumulative_sum:
    custom_order: true
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
      keep_group_coordinates: true
    cumulative_sum:
      coord: time
      weights: true
    convert_units:
      units: Pg
diagnostics:
  tcre:
    variables:
      tas:
        preprocessor: global_annual_mean_anomaly
        additional_datasets:
        - project: CMIP6
          activity: C4MIP CDRMIP
          dataset: MPI-ESM1-2-LR
          ensemble: r1i1p1f1
          institute: MPI-M
          exp: esm-1pctCO2
          grid: gn
          mip: Amon
          timerange: 1850/1914
      tas_control:
        short_name: tas
        preprocessor: global_annual_mean_anomaly
        additional_datasets:
        - project: CMIP6
          activity: CMIP
          dataset: MPI-ESM1-2-LR
          ensemble: r1i1p1f1
          institute: MPI-M
          exp: esm-piControl
          grid: gn
          mip: Amon
          timerange: 1850/1914
      fco2antt:
        preprocessor: global_cumulative_sum
        additional_datasets:
        - project: CMIP6
          activity: C4MIP CDRMIP
          dataset: MPI-ESM1-2-LR
          ensemble: r1i1p1f1
          institute: MPI-M
          exp: esm-1pctCO2
          grid: gn
          mip: Amon
          timerange: 1850/1914
    scripts:
      calculate_tcre:
        script: climate_metrics/tcre.py
        caption: "Global annual mean near-surface air temperature anomaly \u0394T\
          \ vs. global annual cumulative CO2 emissions E of the emission-driven 1%\
          \ CO2 increase per year experiment. The transient climate response to cumulative\
          \ CO2 Emissions (TCRE) is defined as the 20-year average \u0394T centered\
          \ at the time where cumulative CO2 emissions E reach 1000 PgC (i.e., after\
          \ 55 years)."
        pyplot_kwargs:
          xlabel: E [PgC]
          ylabel: "\u0394T [K]"
        calc_tcre_period:
        - 45
        - 65
        exp_target: esm-1pctCO2
