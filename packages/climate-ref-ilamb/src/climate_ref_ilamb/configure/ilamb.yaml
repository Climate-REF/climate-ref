registry: ilamb

gpp-WECANN:
  version: 3
  sources:
    gpp:
      obs_source: obs4ref
      source_id: WECANN-1-0
      variable_id: gpp
      grid_label: gn
      version: v20250902
  relationships:
    pr: ilamb/pr/GPCPv2.3/pr.nc
    # pr: obs4REF/NOAA-NCEI/GPCP-2-3/mon/pr/gn/v20210727/pr_mon_GPCP-2-3_PCMDI_gn_197901-201907.nc
    tas: ilamb/tas/CRU4.02/tas.nc
  variable_cmap: Greens

gpp-FLUXNET2015:
  version: 3
  sources:
    # Referenced by exact registry key rather than ingested facets: this file's
    # source_id is spelled three different ways across its path
    # (FLUXNET2015-1-0), filename (Fluxnet-2015-1-0) and internal attribute
    # (Fluxnet-2015), so no single facet filter matches both the fetch and the
    # solve stage until the upstream metadata is reconciled.
    gpp: obs4REF/Fluxnet/FLUXNET2015-1-0/mon/gpp/site/v20260202/gpp_mon_Fluxnet-2015-1-0_REF_site_19910101-20141231.nc
  variable_cmap: Greens

mrro-LORA:
  version: 3
  sources:
    mrro:
      obs_source: obs4ref
      source_id: LORA-1-0
      variable_id: mrro
      grid_label: gn
      version: v20250902
  variable_cmap: Blues

mrsos-WangMao:
  sources:
    mrsol: ilamb/mrsol/WangMao/mrsol_olc.nc
  alternate_vars:
  - mrsos
  transforms:
  - select_depth:
      value: 0
  - soil_moisture_to_vol_fraction
  variable_cmap: Blues

cSoil-HWSD2:
  version: 3
  sources:
    cSoil:
      obs_source: obs4ref
      source_id: HWSD-2-0
      variable_id: cSoil
      grid_label: gn
      version: v20250903
  variable_cmap: viridis

lai-AVH15C1:
  # TODO: Update to use the obs4REF equiv
  sources:
    lai: ilamb/lai/AVH15C1/lai.nc
    # lai:
    #   obs_source: obs4mips
    #   source_id: NOAA-NCEI-LAI-AVHRR-5-0
  variable_cmap: Greens

nbp-Hoffman:
  version: 3
  analyses:
  - nbp
  sources:
    nbp:
      obs_source: obs4ref
      source_id: Hoffman-1-0
      variable_id: nbp
      grid_label: gm
      version: v20251117
  transforms:
  - integrate_space:
      varname: nbp

snc-ESACCI:
  version: 3
  sources:
    snc:
      obs_source: obs4ref
      source_id: CCI-CryoClim-FSC-1
      variable_id: snc
      grid_label: gn
      version: v20250519

burntFractionAll-GFED:
  version: 3
  sources:
    burntFractionAll:
      obs_source: obs4ref
      source_id: GFED-5-0
      variable_id: burntFractionAll
      grid_label: gr
      version: v20260128
  test_source_id: CESM2

emp-GLEAMGPCP2.3:
  analysis_variable: emp
  sources:
    et: ilamb/evspsbl/GLEAMv3.3a/et.nc
    pr: obs4REF/NOAA-NCEI/GPCP-2-3/mon/pr/gn/v20210727/pr_mon_GPCP-2-3_PCMDI_gn_197901-201907.nc
  transforms:
  - select_time:
      vmin: 2000-01
      vmax: 2015-01
  - expression:
      expr: emp = et - pr
  alternate_vars:
  - evspsbl
