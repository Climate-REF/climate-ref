realm: ocean

thetao-WOA2023-surface:
  version: 3
  sources:
    # WOA-23 monthly climatology (2005-2022); surface field via select_depth.
    thetao:
      obs_source: obs4ref
      source_id: WOA-23
      variable_id: thetao
      grid_label: gn
      version: v20251024
  variable_cmap: Reds
  transforms:
  - select_depth:
      value: 0
  alternate_vars:
  - tos

so-WOA2023-surface:
  version: 3
  sources:
    # WOA-23 monthly climatology (2005-2022); surface field via select_depth.
    so:
      obs_source: obs4ref
      source_id: WOA-23
      variable_id: so
      grid_label: gn
      version: v20251024
  transforms:
  - select_depth:
      value: 0
  variable_cmap: YlGn
  alternate_vars:
  - sos

amoc-RAPID:
  version: 3
  analyses:
  - timeseries
  related_vars:
  - msftmz
  transforms:
  - msftmz_to_rapid
  sources:
    # RAPID-2023-1a obs4REF provides raw msftmz; msftmz_to_rapid derives the AMOC index.
    msftmz:
      obs_source: obs4ref
      source_id: RAPID-2023-1a
      variable_id: msftmz
      grid_label: gm
      version: v20250902
