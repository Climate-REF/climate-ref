registry: iomb

thetao-WOA2023-surface:
  sources:
    # WOA-23 monthly climatology (2005-2022); surface field via select_depth.
    thetao: obs4REF/NOAA-NCEO-OCL/WOA-23/monC/thetao/gn/v20251024/thetao_monC_WOA-23_REF_gn_200501-202212.nc
  variable_cmap: Reds
  transforms:
  - select_depth:
      value: 0
  alternate_vars:
  - tos

so-WOA2023-surface:
  sources:
    # WOA-23 monthly climatology (2005-2022); surface field via select_depth.
    so: obs4REF/NOAA-NCEO-OCL/WOA-23/monC/so/gn/v20251024/so_monC_WOA-23_REF_gn_200501-202212.nc
  transforms:
  - select_depth:
      value: 0
  variable_cmap: YlGn
  alternate_vars:
  - sos

amoc-RAPID:
  analyses:
  - timeseries
  related_vars:
  - msftmz
  transforms:
  - msftmz_to_rapid
  sources:
    # RAPID-2023-1a obs4REF provides raw msftmz; msftmz_to_rapid derives the AMOC index.
    msftmz: obs4REF/NOC/RAPID-2023-1a/mon/msftmz/gm/v20250902/msftmz_mon_RAPID-2023-1a_REF_gm_200404-202302.nc
